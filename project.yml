name: swiftui_sttextview_macos_demo
options:
  bundleIdPrefix: com.freewind
  deploymentTarget:
    macOS: "14.0"
packages:
  STTextView:
    url: https://github.com/krzyzanowskim/STTextView
    from: 2.3.10
  swift-syntax:
    url: https://github.com/swiftlang/swift-syntax.git
    from: 600.0.1
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  swiftui_sttextview_macos_demo:
    type: application
    platform: macOS
    productName: swiftui_sttextview_macos_demo
    sources:
      - Sources
    dependencies:
      - package: STTextView
        product: STTextView
      - package: swift-syntax
        product: SwiftParser
      - package: swift-syntax
        product: SwiftSyntax
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freewind.swiftuisttextviewmacosdemo
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
    scheme:
      testTargets: []
schemes:
  swiftui_sttextview_macos_demo:
    build:
      targets:
        swiftui_sttextview_macos_demo: all
    run:
      config: Debug
